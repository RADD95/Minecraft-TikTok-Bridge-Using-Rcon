<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>MC TikTok Overlay</title>
  <script src="/script/konva.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }
    #overlayRoot {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    #overlayStageContainer {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div id="overlayRoot">
    <div id="overlayStageContainer"></div>
  </div>

  <!-- Runtime sencillo para leer el JSON y dibujar -->
  <script src="/script/overlay.js"></script>
</body>
</html>
